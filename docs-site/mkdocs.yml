site_name: AutoML-AutoDL
site_description: Documentation for a tabular AutoML and AutoDL risk modeling workspace.
repo_name: automl-autodl
repo_url: https://github.com/billzi2016/automl-autodl

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          name: 简体中文
          build: true
          default: true
          site_name: AutoML-AutoDL 文档
        - locale: en
          name: English
          build: true
          site_name: AutoML-AutoDL Documentation
          nav_translations:
            首页: Home
            快速开始: Quick start
            数据与预处理: Data and preprocessing
            AutoML: AutoML
            AutoML 总览: AutoML overview
            GridSearchCV 详解: GridSearchCV details
            AutoML 算法详解: AutoML algorithms
            AutoDL: AutoDL
            AutoDL 总览: AutoDL overview
            AutoDL 模型详解: AutoDL models
            项目: Project
            设备与输出: Devices and outputs
            项目结构: Project structure
            PRD: PRDs

nav:
  - 首页: index.md
  - 快速开始: guide/quick-start.md
  - 数据与预处理: guide/data-preprocessing.md
  - AutoML:
      - AutoML 总览: algorithms/automl-overview.md
      - GridSearchCV 详解: algorithms/gridsearchcv.md
      - AutoML 算法详解: algorithms/automl-algorithms.md
  - AutoDL:
      - AutoDL 总览: algorithms/autodl-overview.md
      - AutoDL 模型详解: algorithms/autodl-models.md
  - 项目:
      - 设备与输出: project/devices-and-outputs.md
      - 项目结构: project/project-structure.md
      - PRD: project/prd.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
